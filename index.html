<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fizika va Elektr Laboratoriyasi</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui">
  <div class="panel experiment-panel">
    <div class="panel-title">
      <span class="panel-title-main">⚡ Elektr Laboratoriyasi</span>
      <span class="active-experiment" id="active-experiment">Lampochka</span>
    </div>

    <div class="experiment-grid" aria-label="Tajribalar">
      <button class="btn-exp active" id="btn-lamp" onclick="loadExperiment('lamp')"><span class="btn-icon">💡</span><span class="btn-label">Lampochka</span></button>
      <button class="btn-exp" id="btn-short" onclick="loadExperiment('short')"><span class="btn-icon">🔥</span><span class="btn-label">Qisqa tutashuv</span></button>
      <button class="btn-exp" id="btn-electrolysis" onclick="loadExperiment('electrolysis')"><span class="btn-icon">🧪</span><span class="btn-label">Elektroliz</span></button>
      <button class="btn-exp" id="btn-parallel" onclick="loadExperiment('parallel')"><span class="btn-icon">🔗</span><span class="btn-label">Parallel zanjir</span></button>
      <button class="btn-exp" id="btn-ohm" onclick="loadExperiment('ohm')"><span class="btn-icon">Ω</span><span class="btn-label">Ohm qonuni</span></button>
      <button class="btn-exp" id="btn-led" onclick="loadExperiment('led')"><span class="btn-icon">🔴</span><span class="btn-label">LED qutbi</span></button>
      <button class="btn-exp" id="btn-motor" onclick="loadExperiment('motor')"><span class="btn-icon">🌀</span><span class="btn-label">Elektr motor</span></button>
      <button class="btn-exp" id="btn-series" onclick="loadExperiment('series')"><span class="btn-icon">💡</span><span class="btn-label">Ketma-ket</span></button>
      <button class="btn-exp" id="btn-dual-battery" onclick="loadExperiment('dual-battery')"><span class="btn-icon">🔋</span><span class="btn-label">2 batareya</span></button>
      <button class="btn-exp" id="btn-rheostat" onclick="loadExperiment('rheostat')"><span class="btn-icon">🎚</span><span class="btn-label">Reostat</span></button>
      <button class="btn-exp" id="btn-capacitor" onclick="loadExperiment('capacitor')"><span class="btn-icon">⚡</span><span class="btn-label">Kondensator</span></button>
      <button class="btn-exp" id="btn-inductor" onclick="loadExperiment('inductor')"><span class="btn-icon">🌀</span><span class="btn-label">Induktor</span></button>
      <button class="btn-exp" id="btn-diode" onclick="loadExperiment('diode')"><span class="btn-icon">▶️</span><span class="btn-label">Diod</span></button>
      <button class="btn-exp" id="btn-transformer" onclick="loadExperiment('transformer')"><span class="btn-icon">🔌</span><span class="btn-label">Transformer</span></button>
      <button class="btn-exp" id="btn-solar" onclick="loadExperiment('solar')"><span class="btn-icon">☀️</span><span class="btn-label">Quyosh paneli</span></button>

    <div id="ohm-controls" style="display:none">
      <div class="inline-actions">
        <button class="chip" onclick="adjustResistance(-5)">− R</button>
        <button class="chip" onclick="adjustResistance(5)">+ R</button>
      </div>
      <div class="control-note" id="resistance-readout">Qarshilik: 15 Ω</div>
    </div>

    <button class="btn-action" onclick="resetWires()" style="background:#64748b">🔄 Simlarni tozalash</button>
  </div>

  <div class="panel">
    <div id="status-box">
      <b>Holat:</b> Simlarni ulang...
    </div>
    <div id="guide-box">
      <span class="guide-title">Qo'llanma</span>
      Tajribani tanlang va klemalarni sxema bo'yicha ulang.
    </div>
    <div class="conn-list" id="conn-list"></div>
  </div>
</div>

<div id="voltage-panel">
  <div class="meter-label">Kuchlanish</div>
  <div class="meter-val" id="volt-val">0.0 <span class="meter-unit">V</span></div>
  <div class="meter-bar"><div class="meter-fill" id="volt-bar" style="width:0%;background:#3b82f6"></div></div>

  <div class="meter-label" style="margin-top:12px">Tok kuchi</div>
  <div class="meter-val" id="amp-val">0.0 <span class="meter-unit">A</span></div>
  <div class="meter-bar"><div class="meter-fill" id="amp-bar" style="width:0%;background:#22c55e"></div></div>

  <div class="meter-label" style="margin-top:12px">Quvvat</div>
  <div class="meter-val" id="watt-val">0.0 <span class="meter-unit">W</span></div>
  <div class="meter-bar"><div class="meter-fill" id="watt-bar" style="width:0%;background:#f59e0b"></div></div>
</div>

<div id="hint">
  🖱 Sag: Kamera | Chap: Klemma → Klemma sim ulash | Scroll: Zoom
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="script.js"></script>
</body>
</html>
