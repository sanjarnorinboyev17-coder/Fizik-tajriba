name: Build Android Debug APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install npm dependencies
        run: |
          npm ci --silent || npm install --no-audit --no-fund --silent

      - name: Build web assets (if script exists)
        run: |
          npm run build || true

      - name: Install Capacitor CLI and Android runtime
        run: |
          npm install --no-save @capacitor/cli @capacitor/android --silent

      - name: Initialize Capacitor and add Android
        env:
          APP_ID: com.sanjarnorinboyev17.fizik
          APP_NAME: FizikTajriba
        run: |
          npx cap init "$APP_NAME" "$APP_ID" --web-dir="." || true
          npx cap add android || true

      - name: Build Android with Gradle wrapper
        run: |
          if [ -d android ]; then
            cd android
            if [ -f ./gradlew ]; then chmod +x ./gradlew; fi
            ./gradlew assembleDebug --no-daemon
          else
            echo "Android project not found after Capacitor step"; exit 1
          fi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
